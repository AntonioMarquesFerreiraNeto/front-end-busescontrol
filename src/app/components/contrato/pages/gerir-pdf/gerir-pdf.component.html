<div class="modal-header">
    <h4 class="modal-title"><i class="fa fa-bus fa-bounce"></i> Controle de contrato</h4>
    <button type="button" class="close-mod" (click)="modal.dismiss()">
        <i class="fa fa-close"></i>
    </button>
</div>
<div class="modal-body">
    <p>
        <strong>Impressões de contrato e rescisões: </strong>
    </p>
    <div class="table-container body-modal-alt">
        <table class="table" #tabela>
            <thead>
                <tr>
                    <th scope="col">Nome/Razão Social</th>
                    <th scope="col">CPF/CNPJ</th>
                    <th scope="col">Classe</th>
                    <th scope="col">Opções</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of contrato.clientesContrato">
                    <td *ngIf="item.pessoaFisica">{{item.pessoaFisica.name}}</td>
                    <td *ngIf="item.pessoaFisica">{{returnCpf(item.pessoaFisica.cpf)}}</td>
                    <td *ngIf="item.pessoaFisica"><span class="borda-table azul-borda">Pessoa fisica</span></td>

                    <td *ngIf="item.pessoaJuridica">{{item.pessoaJuridica.razaoSocial}}</td>
                    <td *ngIf="item.pessoaJuridica">{{returnCnpj(item.pessoaJuridica.cnpj)}}</td>
                    <td *ngIf="item.pessoaJuridica"><span class="borda-table roxo-borda">Pessoa jurídica</span></td>

                    <td *ngIf="item.pessoaFisica else opPessoaJuridica">
                        <a class="link link-verde" routerLink="/contrato" (click)="downloadContratoPF(item.pessoaFisicaId!)"><i class="fa fa-download"></i>
                        </a>
                        <a class="link link-orange" routerLink="/contrato"><i class="fa fa-download"></i>
                        </a>
                    </td>
                    <ng-template #opPessoaJuridica>
                        <td>
                            <a class="link link-verde" routerLink="/contrato" (click)="downloadContratoPJ(item.pessoaJuridicaId!)"><i class="fa fa-download"></i>
                            </a>
                            <a class="link link-orange" routerLink="/contrato"><i class="fa fa-download"></i>
                            </a>
                        </td>
                    </ng-template>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="modal-footer">
</div>
